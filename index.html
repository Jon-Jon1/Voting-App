<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="votingapp.js"  defer></script>
</head>
<body>
    <div class="container">
        <h1> Quick Poll</h1>
        <p class="question"> Do you like javascript</p>

        <div class="voting-buttons">
            <button class="yes-btn" onclick="vote('yes')">Yes</button>
            <button class="no-btn" onclick="vote('no')">No</button>
            <button class="maybe-btn" onclick="vote('maybe')">Maybe</button>
        </div>

        <div class="results" id="result">
            <h2>Results</h2>
            <p class="no-votes">No votes yet, cast your votes for details.</p>
        </div>

        <div class="vote-list">
            <h3>Vote History</h3>
            <div id="voteItems"></div>
        </div>

        <button class="reset-btn" onclick="resetVotes()">Reset Votes</button>
    </div>
</body>
</html>
